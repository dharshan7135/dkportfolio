<!DOCTYPE html>
<html>
<head>
  <title>Background Remover</title>
</head>
<body>
  <h1>Removing Background...</h1>
  <canvas id="canvas"></canvas>
  <script>
    const img = new Image();
    img.src = '/assets/h1.jpeg';
    img.onload = () => {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);

      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      const W = canvas.width;
      const H = canvas.height;

      // Flood fill from corners
      const visited = new Uint8Array(W * H);
      const queue = [];

      // Starting points: top-left, top-right, bottom-left, bottom-right
      const seeds = [
        [0, 0],
        [W - 1, 0],
        [0, H - 1],
        [W - 1, H - 1]
      ];

      // We determine target background color from the average of the corners
      let totalR = 0, totalG = 0, totalB = 0;
      seeds.forEach(([x, y]) => {
        const idx = (y * W + x) * 4;
        totalR += data[idx];
        totalG += data[idx + 1];
        totalB += data[idx + 2];
      });
      const bgR = totalR / seeds.length;
      const bgG = totalG / seeds.length;
      const bgB = totalB / seeds.length;

      seeds.forEach(([x, y]) => {
        queue.push(x, y);
        visited[y * W + x] = 1;
      });

      const threshold = 75; // Euclidean distance threshold in RGB space

      while (queue.length > 0) {
        const y = queue.pop();
        const x = queue.pop();

        const idx = (y * W + x) * 4;
        
        // Mark as transparent
        data[idx + 3] = 0;

        // Check 4-neighbors
        const neighbors = [
          [x + 1, y],
          [x - 1, y],
          [x, y + 1],
          [x, y - 1]
        ];

        for (const [nx, ny] of neighbors) {
          if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
            const nIdx = ny * W + nx;
            if (!visited[nIdx]) {
              const pIdx = nIdx * 4;
              const r = data[pIdx];
              const g = data[pIdx + 1];
              const b = data[pIdx + 2];

              const dist = Math.sqrt(
                Math.pow(r - bgR, 2) +
                Math.pow(g - bgG, 2) +
                Math.pow(b - bgB, 2)
              );

              // If it's similar to the background color, fill it
              if (dist < threshold) {
                visited[nIdx] = 1;
                queue.push(nx, ny);
              }
            }
          }
        }
      }

      // Edge feathering to smooth out jagged outlines
      for (let y = 1; y < H - 1; y++) {
        for (let x = 1; x < W - 1; x++) {
          const idx = (y * W + x) * 4;
          if (data[idx + 3] > 0) {
            // Check if it neighbors any transparent pixel
            let transNeighbors = 0;
            const checks = [
              ((y-1)*W + x)*4 + 3,
              ((y+1)*W + x)*4 + 3,
              (y*W + (x-1))*4 + 3,
              (y*W + (x+1))*4 + 3
            ];
            checks.forEach(cIdx => {
              if (data[cIdx] === 0) transNeighbors++;
            });

            if (transNeighbors > 0) {
              // Soften the boundary pixel alpha
              data[idx + 3] = Math.round(data[idx + 3] * (1 - transNeighbors * 0.22));
            }
          }
        }
      }

      ctx.putImageData(imgData, 0, 0);

      // Send to local saver server
      const dataUrl = canvas.toDataURL('image/png');
      fetch('http://localhost:8080/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: dataUrl })
      })
      .then(res => res.text())
      .then(msg => {
        document.body.innerHTML = '<h1>Successfully removed background and saved!</h1>';
        console.log(msg);
      })
      .catch(err => {
        document.body.innerHTML = '<h1>Error saving: ' + err.message + '</h1>';
        console.log(err);
      });
    };
  </script>
</body>
</html>
